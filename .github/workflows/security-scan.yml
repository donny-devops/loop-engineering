name: Security Scan
on:
  schedule:
    - cron: '0 4 * * 1'
  workflow_dispatch:
jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm audit --omit=dev || true
      - run: python tools/secret-scanner/secret_scanner.py || true
